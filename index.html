<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ioannis Chantolios | Portfolio</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <div id="desktop">
        <div class="window" id="profile-window">
            <div class="title-bar">
                <div class="title">User_Profile.exe</div>
                <div class="controls">
                    <button>_</button>
                    <button>X</button>
                </div>
            </div>
            <div class="window-body">
                <img src="https://github.com/IoannisCh.png" alt="Ioannis" class="avatar">
                <h2>IoannisCh</h2>
                <p>Full-Stack Developer | Modern Tech Enthusiast</p>
                <hr>
                <p>Building the future with tools from the past.</p>
                <a href="https://github.com/IoannisCh" class="retro-btn">View GitHub</a>
            </div>
        </div>

        <div class="window" id="tech-window">
            <div class="title-bar">
                <div class="title">Modern_Tech.sys</div>
            </div>
            <div class="window-body">
                <ul class="tech-list">
                    <li>> React.js</li>
                    <li>> TypeScript</li>
                    <li>> Node.js</li>
                    <li>> Next.js</li>
                </ul>
            </div>
        </div>
    </div>

    <div id="taskbar">
        <button class="start-btn">Start</button>
        <div class="time" id="clock">12:00 PM</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
